<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Tracker | SNKRDUNK</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>ポケtracker</h2>
            </div>

            <div class="search-container">
                <input type="text" id="card-search" data-i18n="searchbox" placeholder="Search name or number..." autocomplete="off">
            </div>
            
            <h3 data-i18n="tracked">Tracked Variants</h3>
            <ul id="card-list" class="card-list">
                <!-- Populated dynamically -->
            </ul>
            
            <div class="sidebar-footer">
                <p class="status">● <span data-i18n="live">Market Data Live</span></p>
                <p class="source" data-i18n="source">Source: SNKRDUNK</p>
            </div>
        </div>

        <div class="main-view">
            <header class="view-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div class="header-info">
                    <h1 id="selected-card-name" data-i18n="select">Select a Card</h1>
                    <p id="selected-card-meta" class="subtitle" data-i18n="subtitle">Detailed market history & trends</p>
                </div>
                <button id="lang-toggle" class="lang-btn">JP / EN</button>
            </header>

            <div class="content-row">
                <!-- Card Image Preview -->
                <div class="card-preview-container">
                    <img id="card-image" src="" alt="Card Preview" class="card-image-preview hidden">
                </div>

                <!-- Stats and Chart -->
                <div class="data-container">
                    <div class="stats-row">
                        <div class="stat-card">
                            <h4 data-i18n="latest_price">Latest Price (JPY)</h4>
                            <div class="value" id="latest-price-jpy">¥0</div>
                            <div class="trend positive" data-i18n="live">Live</div>
                        </div>
                    </div>

                    <div class="chart-section">
                        <div class="chart-controls">
                            <button class="time-btn active" data-range="all" data-i18n="all_time">All Time</button>
                            <button class="time-btn" data-range="monthly" data-i18n="monthly">30 Days</button>
                            <button class="time-btn" data-range="weekly" data-i18n="weekly">7 Days</button>
                        </div>
                        <div class="chart-container">
                            <canvas id="priceChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Configuration for Frontend -->
    <script src="app.js"></script>
</body>
</html>
